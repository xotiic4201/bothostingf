<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXEL REALMS · ONLINE MULTIPLAYER RPG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        :root {
            --gold: #ffd700;
            --dark-gold: #b8860b;
            --bg-deep: #0a0c0e;
            --bg-dark: #1a1d21;
            --bg-panel: #2a2a35;
            --bg-item: #1e1e28;
            --border-brown: #6b4f3c;
            --border-gold: #8b7a5a;
            --text-light: #e0d3b0;
            --text-muted: #a0a0b0;
            --hp-red: #ff4444;
            --mana-blue: #4444ff;
            --exp-green: #44ff44;
        }

        body {
            background: var(--bg-deep);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            font-family: 'Press Start 2P', 'Courier New', monospace;
        }

        /* Pixel Font */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        /* Canvas */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            image-rendering: pixelated;
            background: #1a332a;
        }

        /* Loading Screen */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: #0f0f1f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            font-family: 'Press Start 2P', cursive;
        }

        .pixel-logo {
            font-size: 48px;
            color: #ffd700;
            text-shadow: 4px 4px 0 #8b6913;
            margin-bottom: 30px;
            letter-spacing: 4px;
        }

        .loading-bar-container {
            width: 400px;
            height: 24px;
            background: #2a2a3a;
            border: 4px solid #4a3a2a;
            margin: 20px 0;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            width: 0%;
            transition: width 0.3s;
        }

        .loading-text {
            color: #a0a0b0;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            inset: 0;
            background: #0a0c1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #login-screen.active {
            display: flex;
        }

        .login-box {
            background: #1a1a2a;
            border: 4px solid #b8860b;
            padding: 40px;
            width: 500px;
            image-rendering: pixelated;
            box-shadow: 8px 8px 0 #00000080;
        }

        .login-title {
            color: #ffd700;
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0 #6b4f2a;
        }

        .login-input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #2a2a3a;
            border: 3px solid #4a3a2a;
            color: #e0d3b0;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            outline: none;
        }

        .login-input:focus {
            border-color: #ffd700;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #3a2a1a;
            border: 3px solid #b8860b;
            color: #ffd700;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            cursor: pointer;
            text-shadow: 2px 2px 0 #4a2a0a;
        }

        .login-btn:hover {
            background: #5a3a2a;
            transform: translateY(-2px);
        }

        .error-box {
            background: #3a1a1a;
            border: 3px solid #ff4444;
            padding: 12px;
            margin: 10px 0;
            color: #ff8888;
            font-size: 12px;
            display: none;
        }

        .error-box.show {
            display: block;
        }

        /* Character Select */
        #char-select-screen {
            position: fixed;
            inset: 0;
            background: #0a0c1a;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 900;
        }

        #char-select-screen.active {
            display: flex;
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .char-card {
            background: #1a1a2a;
            border: 4px solid #4a3a2a;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }

        .char-card:hover {
            border-color: #b8860b;
            transform: translateY(-5px);
            background: #2a2a3a;
        }

        .char-card.selected {
            border-color: #ffd700;
            background: #2a2840;
        }

        .char-sprite {
            width: 64px;
            height: 64px;
            margin: 0 auto 10px;
            background: #2a2a3a;
            image-rendering: pixelated;
        }

        .char-name {
            color: #ffd700;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .char-level {
            color: #a0a0b0;
            font-size: 12px;
        }

        /* HUD */
        .hud-element {
            position: absolute;
            z-index: 200;
            image-rendering: pixelated;
        }

        #hud-player {
            top: 15px;
            left: 15px;
            width: 320px;
            background: #1a1a2a;
            border: 4px solid #b8860b;
            padding: 15px;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .hud-name {
            color: #ffd700;
            font-size: 16px;
            text-shadow: 2px 2px 0 #6b4f2a;
        }

        .hud-level {
            color: #a0a0b0;
            font-size: 12px;
        }

        .hud-bar {
            margin: 10px 0;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            color: #a0a0b0;
            font-size: 10px;
            margin-bottom: 3px;
        }

        .bar {
            height: 20px;
            background: #2a2a3a;
            border: 3px solid #3a3a4a;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.2s;
        }

        .bar-fill.hp {
            background: #ff4444;
            box-shadow: 0 0 10px #ff0000;
        }

        .bar-fill.mp {
            background: #4444ff;
            box-shadow: 0 0 10px #0000ff;
        }

        .bar-fill.xp {
            background: #44ff44;
            box-shadow: 0 0 10px #00ff00;
        }

        .bar-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            text-shadow: 1px 1px 0 #000;
        }

        #hud-actions {
            top: 15px;
            left: 350px;
            display: flex;
            gap: 8px;
        }

        .hud-btn {
            background: #1a1a2a;
            border: 3px solid #b8860b;
            color: #e0d3b0;
            padding: 10px 15px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            cursor: pointer;
        }

        .hud-btn:hover {
            border-color: #ffd700;
            color: #ffd700;
            transform: translateY(-2px);
        }

        #hud-minimap {
            bottom: 200px;
            right: 15px;
            width: 160px;
            height: 160px;
            background: #1a1a2a;
            border: 4px solid #b8860b;
        }

        #minimap-canvas {
            width: 160px;
            height: 160px;
            image-rendering: pixelated;
        }

        #hud-chat {
            bottom: 10px;
            left: 10px;
            width: 450px;
            height: 250px;
            background: #1a1a2a;
            border: 4px solid #b8860b;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            font-size: 11px;
            color: #e0d3b0;
        }

        .chat-message {
            margin: 4px 0;
            line-height: 1.4;
        }

        .chat-message .time {
            color: #6b4f2a;
            margin-right: 5px;
        }

        .chat-message .sender {
            color: #ffd700;
            font-weight: bold;
            margin-right: 5px;
        }

        .chat-input-area {
            display: flex;
            border-top: 3px solid #4a3a2a;
            padding: 5px;
        }

        #chat-input {
            flex: 1;
            background: #2a2a3a;
            border: 2px solid #4a3a2a;
            color: #e0d3b0;
            padding: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            outline: none;
        }

        #chat-send {
            background: #3a2a1a;
            border: 2px solid #b8860b;
            color: #ffd700;
            padding: 0 15px;
            margin-left: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Popups */
        .popup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .popup-overlay.show {
            display: flex;
        }

        .popup-box {
            background: #1a1a2a;
            border: 4px solid #b8860b;
            padding: 25px;
            min-width: 400px;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #4a3a2a;
        }

        .popup-title {
            color: #ffd700;
            font-size: 18px;
        }

        .popup-close {
            background: none;
            border: 2px solid #aa4444;
            color: #aa4444;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Inventory Grid */
        .inv-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .inv-slot {
            aspect-ratio: 1;
            background: #2a2a3a;
            border: 3px solid #4a3a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            font-size: 24px;
        }

        .inv-slot:hover {
            border-color: #ffd700;
            transform: scale(1.05);
        }

        .inv-quantity {
            position: absolute;
            bottom: 2px;
            right: 3px;
            font-size: 10px;
            color: #ffd700;
        }

        /* Notifications */
        #notifications {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
            z-index: 10000;
        }

        .notification {
            background: #1a1a2a;
            border-left: 4px solid #ffd700;
            padding: 12px 15px;
            margin-bottom: 8px;
            color: #e0d3b0;
            font-size: 12px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification.success { border-left-color: #44ff44; }
        .notification.error { border-left-color: #ff4444; }
        .notification.warning { border-left-color: #ffaa00; }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <!-- Canvas -->
    <canvas id="game-canvas"></canvas>

    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="pixel-logo">⚔ PIXEL REALMS ⚔</div>
        <div class="loading-bar-container">
            <div class="loading-bar-fill" id="loading-bar"></div>
        </div>
        <div class="loading-text" id="loading-text">Initializing...</div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <div class="login-title">⚔ PIXEL REALMS ⚔</div>
            <input type="email" id="login-email" class="login-input" placeholder="EMAIL" autocomplete="email">
            <input type="password" id="login-password" class="login-input" placeholder="PASSWORD" autocomplete="current-password">
            <div class="error-box" id="login-error"></div>
            <button class="login-btn" onclick="handleLogin()">▶ LOGIN</button>
            <button class="login-btn" onclick="handleSignUp()">➕ SIGN UP</button>
        </div>
    </div>

    <!-- Character Select Screen -->
    <div id="char-select-screen">
        <div class="login-box" style="width: 800px;">
            <div class="login-title">SELECT YOUR HERO</div>
            <div class="char-grid" id="char-grid"></div>
            <button class="login-btn" onclick="showCharacterCreation()">➕ CREATE NEW</button>
            <button class="login-btn" onclick="logout()" style="background: #2a2a3a;">◀ LOGOUT</button>
        </div>
    </div>

    <!-- Character Creation Screen -->
    <div id="char-create-screen">
        <div class="login-box" style="width: 600px;">
            <div class="login-title">CREATE HERO</div>
            <input type="text" id="new-char-name" class="login-input" placeholder="NAME" maxlength="20">
            <select id="new-char-class" class="login-input" style="margin: 10px 0;">
                <option value="warrior">⚔️ WARRIOR - High HP & Strength</option>
                <option value="mage">🧙 MAGE - Powerful Spells</option>
                <option value="rogue">🗡️ ROGUE - Critical Hits</option>
                <option value="archer">🏹 ARCHER - Ranged Attacks</option>
                <option value="paladin">🛡️ PALADIN - Holy Warrior</option>
            </select>
            <div class="error-box" id="char-create-error"></div>
            <button class="login-btn" onclick="createCharacter()">⚔ START ADVENTURE</button>
        </div>
    </div>

    <!-- HUD Elements -->
    <div class="hud-element" id="hud-player">
        <div class="hud-header">
            <span class="hud-name" id="hud-name">Hero</span>
            <span class="hud-level" id="hud-level">Lv.1</span>
        </div>
        <div class="hud-bar">
            <div class="bar-label">
                <span>❤️ HP</span>
                <span id="hud-hp-text">100/100</span>
            </div>
            <div class="bar">
                <div class="bar-fill hp" id="hud-hp-bar" style="width: 100%"></div>
                <div class="bar-text" id="hud-hp-percent">100%</div>
            </div>
        </div>
        <div class="hud-bar">
            <div class="bar-label">
                <span>💙 MP</span>
                <span id="hud-mp-text">50/50</span>
            </div>
            <div class="bar">
                <div class="bar-fill mp" id="hud-mp-bar" style="width: 100%"></div>
                <div class="bar-text" id="hud-mp-percent">100%</div>
            </div>
        </div>
        <div class="hud-bar">
            <div class="bar-label">
                <span>⭐ EXP</span>
                <span id="hud-exp-text">0/100</span>
            </div>
            <div class="bar" style="height: 15px;">
                <div class="bar-fill xp" id="hud-exp-bar" style="width: 0%"></div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 10px;">
            <span>💰 <span id="hud-gold">100</span>g</span>
            <span>⚔️ <span id="hud-attack">10</span></span>
            <span>🛡️ <span id="hud-defense">5</span></span>
        </div>
    </div>

    <div class="hud-element" id="hud-actions">
        <button class="hud-btn" onclick="openInventory()">🎒 BAG</button>
        <button class="hud-btn" onclick="openSkills()">⚡ SKILLS</button>
        <button class="hud-btn" onclick="openQuests()">📜 QUESTS</button>
        <button class="hud-btn" onclick="openPVP()">⚔️ PVP</button>
    </div>

    <div class="hud-element" id="hud-minimap">
        <canvas id="minimap-canvas" width="160" height="160"></canvas>
    </div>

    <div class="hud-element" id="hud-chat">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" class="chat-input" placeholder="Type message..." maxlength="100">
            <button id="chat-send" onclick="sendChat()">➤</button>
        </div>
    </div>

    <!-- Popups -->
    <div class="popup-overlay" id="inventory-popup">
        <div class="popup-box">
            <div class="popup-header">
                <span class="popup-title">🎒 INVENTORY</span>
                <button class="popup-close" onclick="closePopup('inventory-popup')">×</button>
            </div>
            <div class="inv-grid" id="inventory-grid"></div>
            <div style="margin-top: 15px; color: #ffd700;">💰 <span id="inventory-gold">0</span> Gold</div>
        </div>
    </div>

    <div class="popup-overlay" id="skills-popup">
        <div class="popup-box">
            <div class="popup-header">
                <span class="popup-title">⚡ SKILLS</span>
                <button class="popup-close" onclick="closePopup('skills-popup')">×</button>
            </div>
            <div id="skills-list"></div>
        </div>
    </div>

    <div class="popup-overlay" id="quests-popup">
        <div class="popup-box">
            <div class="popup-header">
                <span class="popup-title">📜 QUESTS</span>
                <button class="popup-close" onclick="closePopup('quests-popup')">×</button>
            </div>
            <div id="quests-list"></div>
        </div>
    </div>

    <div class="popup-overlay" id="pvp-popup">
        <div class="popup-box">
            <div class="popup-header">
                <span class="popup-title">⚔️ PVP ARENA</span>
                <button class="popup-close" onclick="closePopup('pvp-popup')">×</button>
            </div>
            <div id="pvp-content"></div>
        </div>
    </div>

    <!-- Notifications -->
    <div id="notifications"></div>

    <script>
        // ==================== SUPABASE CONFIG ====================
        const SUPABASE_URL = 'https://your-project.supabase.co'; // Replace with your Supabase URL
        const SUPABASE_ANON_KEY = 'your-anon-key'; // Replace with your Supabase anon key
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== PIXEL ASSETS (Generated programmatically) ====================
        const SPRITES = {
            // Player sprites (8x8 pixel art)
            warrior: generateWarriorSprite(),
            mage: generateMageSprite(),
            rogue: generateRogueSprite(),
            archer: generateArcherSprite(),
            paladin: generatePaladinSprite(),
            
            // Enemy sprites
            goblin: generateGoblinSprite(),
            skeleton: generateSkeletonSprite(),
            orc: generateOrcSprite(),
            troll: generateTrollSprite(),
            
            // NPCs
            merchant: generateMerchantSprite(),
            blacksmith: generateBlacksmithSprite(),
            
            // Items
            sword: '🗡️',
            bow: '🏹',
            staff: '🪄',
            potion: '🧪',
            gold: '💰'
        };

        // Sprite generation functions (creates pixel data)
        function generateWarriorSprite() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            
            // Draw warrior pixel art
            ctx.fillStyle = '#4a4a8a'; // Armor
            ctx.fillRect(4, 2, 8, 4); // Helm
            ctx.fillStyle = '#6a6aaa';
            ctx.fillRect(3, 6, 10, 6); // Body
            ctx.fillStyle = '#aa8a4a'; // Sword
            ctx.fillRect(12, 4, 2, 8);
            ctx.fillStyle = '#8a6a4a';
            ctx.fillRect(2, 8, 2, 4); // Legs
            ctx.fillRect(12, 8, 2, 4);
            
            return canvas;
        }

        function generateMageSprite() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            
            ctx.fillStyle = '#4a2a8a'; // Robe
            ctx.fillRect(4, 2, 8, 2); // Hat
            ctx.fillRect(3, 4, 10, 8); // Body
            ctx.fillStyle = '#aa6a4a'; // Staff
            ctx.fillRect(12, 4, 2, 10);
            ctx.fillStyle = '#ffaa00'; // Magic
            ctx.fillRect(13, 2, 2, 2);
            
            return canvas;
        }

        function generateRogueSprite() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#2a4a2a'; // Hood
            ctx.fillRect(4, 2, 8, 2);
            ctx.fillStyle = '#4a6a4a'; // Cloak
            ctx.fillRect(3, 4, 10, 8);
            ctx.fillStyle = '#aaaaaa'; // Daggers
            ctx.fillRect(10, 6, 2, 6);
            ctx.fillRect(4, 6, 2, 6);
            
            return canvas;
        }

        function generateArcherSprite() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#6a8a4a'; // Leather
            ctx.fillRect(4, 2, 8, 10);
            ctx.fillStyle = '#aa8a4a'; // Bow
            ctx.fillRect(10, 4, 4, 8);
            ctx.fillStyle = '#ffffff'; // Arrow
            ctx.fillRect(12, 2, 2, 2);
            
            return canvas;
        }

        function generatePaladinSprite() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#aaaaaa'; // Armor
            ctx.fillRect(3, 2, 10, 4);
            ctx.fillStyle = '#8a8aaa'; // Cape
            ctx.fillRect(2, 6, 12, 8);
            ctx.fillStyle = '#ffaa00'; // Holy symbol
            ctx.fillRect(7, 4, 2, 2);
            
            return canvas;
        }

        function generateGoblinSprite() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#4a8a4a'; // Green
            ctx.fillRect(4, 2, 8, 4);
            ctx.fillStyle = '#6aaa6a';
            ctx.fillRect(3, 6, 10, 6);
            ctx.fillStyle = '#aa4a4a'; // Eyes
            ctx.fillRect(5, 3, 2, 2);

        // Tilemap generator
        function generateTilemap() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            
            // Generate tiles
            for (let y = 0; y < 16; y++) {
                for (let x = 0; x < 16; x++) {
                    const tileX = x * 16;
                    const tileY = y * 16;
                    
                    // Grass
                    ctx.fillStyle = (x + y) % 2 === 0 ? '#3a6a3a' : '#4a7a4a';
                    ctx.fillRect(tileX, tileY, 16, 16);
                    
                    // Add details
                    ctx.fillStyle = '#5a8a5a';
                    if (Math.random() > 0.7) {
                        ctx.fillRect(tileX + 4, tileY + 4, 2, 2);
                        ctx.fillRect(tileX + 10, tileY + 10, 2, 2);
                    }
                }
            }
            
            return canvas;
        }

        // ==================== GAME STATE ====================
        let currentUser = null;
        let currentCharacter = null;
        let characters = [];
        let gameRenderer = null;
        let ws = null;
        let currentChatChannel = 'global';
        let activePlayers = new Map(); // Other players in world
        let inventory = [];
        let skills = [];
        let quests = [];
        let gold = 0;
        let attackPower = 10;

        window.onload = async function() {
            updateLoading(20, 'Loading pixel assets...');
            await loadPixelAssets();
            
            updateLoading(40, 'Connecting to server...');

            updateLoading(80, 'Almost ready...');
            await new Promise(r => setTimeout(r, 500));

        async function loadPixelAssets() {
            // Pre-generate all sprites

                    const ctx = SPRITES[key].getContext('2d');

        function showScreen(screenId) {

            });

        // ==================== SUPABASE AUTH ====================
        async function checkSession() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                await loadCharacters();
            }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                currentUser = data.user;
                errorEl.classList.remove('show');
                await loadCharacters();
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.add('show');
            }
        }

        async function handleSignUp() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');

            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters';
                errorEl.classList.add('show');
                return;
            }

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password
                });

                if (error) throw error;

                currentUser = data.user;
                errorEl.textContent = 'Account created! Please check your email for verification.';
                errorEl.style.color = '#44ff44';
                errorEl.classList.add('show');
            } catch (error) {
                errorEl.textContent = error.message;
                errorEl.classList.add('show');
            }
        }

        function logout() {
            supabase.auth.signOut();
            currentUser = null;
            currentCharacter = null;
            showScreen('login-screen');
        }

        // ==================== CHARACTER MANAGEMENT ====================
        async function loadCharacters() {
            if (!currentUser) return;

            const { data, error } = await supabase
                .from('characters')
                .select('*')
                .eq('user_id', currentUser.id);

            if (error) {
                showNotification('Failed to load characters', 'error');
                return;
            }

            characters = data || [];
            
            if (characters.length > 0) {
                renderCharacterSelect();
                showScreen('char-select-screen');
            } else {

        function renderCharacterSelect() {
            const grid = document.getElementById('char-grid');
            grid.innerHTML = '';

            characters.forEach(char => {
                const sprite = SPRITES[char.class] || SPRITES.warrior;
                const spriteUrl = sprite instanceof HTMLCanvasElement ? sprite.toDataURL() : '';

                const card = document.createElement('div');
                card.className = 'char-card';
                card.onclick = () => selectCharacter(char.id);
                card.innerHTML = `
                    <img src="${spriteUrl}" class="char-sprite" style="width: 64px; height: 64px; image-rendering: pixelated;">
                    <div class="char-name">${char.name}</div>
                    <div class="char-level">Lv.${char.level} ${char.class}</div>
                `;

        function showCharacterCreation() {

        async function createCharacter() {
            const name = document.getElementById('new-char-name').value.trim();
            const className = document.getElementById('new-char-class').value;
            const errorEl = document.getElementById('char-create-error');

            if (name.length < 3) {
                errorEl.textContent = 'Name must be at least 3 characters';
                errorEl.classList.add('show');
                return;
            }

            // Base stats per class
            const baseStats = {
                warrior: { hp: 120, mana: 40, attack: 15, defense: 10 },
                mage: { hp: 80, mana: 100, attack: 20, defense: 3 },
                rogue: { hp: 90, mana: 60, attack: 18, defense: 5 },
                archer: { hp: 85, mana: 55, attack: 17, defense: 4 },
                paladin: { hp: 110, mana: 50, attack: 14, defense: 12 }
            };

            const stats = baseStats[className];

            const { data, error } = await supabase
                .from('characters')
                .insert([{
                    user_id: currentUser.id,
                    name: name,
                    class: className,
                    level: 1,
                    exp: 0,
                    gold: 100,
                    hp: stats.hp,
                    max_hp: stats.hp,
                    mana: stats.mana,
                    max_mana: stats.mana,
                    attack: stats.attack,
                    defense: stats.defense,
                    x: 50,
                    y: 50
                }])
                .select();

            if (error) {
                errorEl.textContent = error.message;
                errorEl.classList.add('show');
                return;
            }

            showNotification(`Welcome, ${name}!`, 'success');
            await loadCharacters();
        }

                .from('characters')
                .select('*')
                .eq('id', characterId)
                .single();

            if (error) {
                showNotification('Failed to load character', 'error');
                return;

            currentCharacter = data;
            await loadInventory(characterId);
            await loadSkills(characterId);
            await loadQuests(characterId);
            
            startGame();

                .eq('character_id', characterId);

            if (!error) {
                inventory = data || [];

        async function loadSkills(characterId) {

                .from('skills')
                .select('*')
                .eq('character_id', characterId);

                skills = data || [];

        async function loadQuests(characterId) {

        // ==================== GAME START ====================
        function startGame() {
            showScreen('game-screen');
            initGameRenderer();
            connectWebSocket();
            updateHUD();
            startHeartbeat();
        }

        function initGameRenderer() {
            const canvas = document.getElementById('game-canvas');
            gameRenderer = new GameRenderer(canvas);
            gameRenderer.start();

            // Keyboard controls
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
        }

        // ==================== WEB SOCKET (Real-time) ====================
        function connectWebSocket() {
            // Use Supabase Realtime for multiplayer
            const channel = supabase.channel('game-world');
            
            channel
                .on('broadcast', { event: 'player_move' }, ({ payload }) => {
                    handlePlayerMove(payload);
                })
                .on('broadcast', { event: 'chat' }, ({ payload }) => {
                    handleChatMessage(payload);
                })
                .on('broadcast', { event: 'combat' }, ({ payload }) => {
                    handleCombatEvent(payload);
                })
                .subscribe(async (status) => {
                    if (status === 'SUBSCRIBED') {
                        // Broadcast that we're online
                        await channel.send({
                            type: 'broadcast',
                            event: 'player_join',
                            payload: {
                                id: currentCharacter.id,
                                name: currentCharacter.name,
                                class: currentCharacter.class,
                                x: currentCharacter.x,
                                y: currentCharacter.y
                            }
                        });
                    }
                });

            ws = channel;
        }

        function handlePlayerMove(payload) {
            if (payload.id !== currentCharacter.id) {
                activePlayers.set(payload.id, payload);
            }
        }

        function handleChatMessage(payload) {
            addChatMessage(payload.sender, payload.message, payload.channel);
        }

        function handleCombatEvent(payload) {
            // Handle combat animations
            if (gameRenderer) {
                gameRenderer.addCombatEffect(payload);
            }
        }

        // ==================== HEARTBEAT (Position updates) ====================
        function startHeartbeat() {
            setInterval(() => {
                if (gameRenderer && currentCharacter) {
                    ws.send({
                        type: 'broadcast',
                        event: 'player_move',
                        payload: {
                            id: currentCharacter.id,
                            x: gameRenderer.player.x,
                            y: gameRenderer.player.y,
                            name: currentCharacter.name
                        }
                    });
                }
            }, 100);
        }

        // ==================== GAME RENDERER ====================
        class GameRenderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.ctx.imageSmoothingEnabled = false;
                
                this.tileSize = 32;
                this.player = {
                    x: currentCharacter?.x || 50,
                    y: currentCharacter?.y || 50,
                    targetX: currentCharacter?.x || 50,
                    targetY: currentCharacter?.y || 50
                };
                
                this.camera = { x: 0, y: 0 };
                this.combatEffects = [];
                
                // World entities (NPCs, enemies)
                this.entities = this.generateWorld();
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            generateWorld() {
                return [
                    // NPCs
                    { id: 'npc1', type: 'npc', name: 'Merchant', class: 'merchant', x: 45, y: 45, dialog: 'Welcome to my shop!' },
                    { id: 'npc2', type: 'npc', name: 'Blacksmith', class: 'blacksmith', x: 55, y: 45, dialog: 'Need weapons?' },
                    
                    // Enemies
                    { id: 'e1', type: 'enemy', name: 'Goblin', class: 'goblin', x: 60, y: 60, hp: 30, maxHp: 30, level: 1 },
                    { id: 'e2', type: 'enemy', name: 'Skeleton', class: 'skeleton', x: 40, y: 70, hp: 45, maxHp: 45, level: 2 },
                    { id: 'e3', type: 'enemy', name: 'Orc', class: 'orc', x: 70, y: 40, hp: 60, maxHp: 60, level: 3 }
                ];
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
            }

            start() {
                this.gameLoop();
            }

            gameLoop() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.gameLoop());
            }

            update() {
                // Smooth player movement
                this.player.x += (this.player.targetX - this.player.x) * 0.1;
                this.player.y += (this.player.targetY - this.player.y) * 0.1;
                
                // Update camera
                this.camera.x = this.player.x * this.tileSize - this.canvas.width / 2;
                this.camera.y = this.player.y * this.tileSize - this.canvas.height / 2;
                
                // Update combat effects
                this.combatEffects = this.combatEffects.filter(e => e.frame++ < 30);
            }

            render() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                // Draw tilemap
                const startX = Math.floor(this.camera.x / this.tileSize) - 2;
                const startY = Math.floor(this.camera.y / this.tileSize) - 2;
                const endX = startX + Math.ceil(this.canvas.width / this.tileSize) + 4;
                const endY = startY + Math.ceil(this.canvas.height / this.tileSize) + 4;
                
                for (let y = startY; y < endY; y++) {
                    for (let x = startX; x < endX; x++) {
                        const screenX = x * this.tileSize - this.camera.x;
                        const screenY = y * this.tileSize - this.camera.y;
                        
                        // Draw ground tile
                        ctx.fillStyle = (x + y) % 2 === 0 ? '#3a6a3a' : '#4a7a4a';
                        ctx.fillRect(screenX, screenY, this.tileSize, this.tileSize);
                        
                        // Add grass details
                        ctx.fillStyle = '#5a8a5a';
                        if ((x * y) % 7 === 0) {
                            ctx.fillRect(screenX + 8, screenY + 8, 4, 4);
                        }
                    }
                }
                
                // Draw entities
                [...this.entities, ...activePlayers.values()].forEach(entity => {
                    const screenX = entity.x * this.tileSize - this.camera.x;
                    const screenY = entity.y * this.tileSize - this.camera.y;
                    
                    if (screenX < -50 || screenX > this.canvas.width + 50 || 
                        screenY < -50 || screenY > this.canvas.height + 50) return;
                    
                    // Get sprite
                    let sprite;
                    if (entity.type === 'player') {
                        sprite = SPRITES[entity.class] || SPRITES.warrior;
                    } else if (entity.type === 'npc') {
                        sprite = SPRITES[entity.class] || SPRITES.merchant;
                    } else {
                        sprite = SPRITES[entity.class] || SPRITES.goblin;
                    }
                    
                    if (sprite instanceof HTMLCanvasElement) {
                        ctx.drawImage(sprite, screenX, screenY, this.tileSize, this.tileSize);
                    } else {
                        ctx.font = '24px "Press Start 2P"';
                        ctx.fillStyle = '#fff';
                        ctx.fillText(sprite, screenX + 4, screenY + 24);
                    }
                    
                    // Draw health bar for enemies
                    if (entity.type === 'enemy' && entity.hp < entity.maxHp) {
                        ctx.fillStyle = '#660000';
                        ctx.fillRect(screenX, screenY - 8, 32, 4);
                        ctx.fillStyle = '#ff4444';
                        const hpPercent = entity.hp / entity.maxHp;
                        ctx.fillRect(screenX, screenY - 8, 32 * hpPercent, 4);
                    }
                    
                    // Draw name
                    if (entity.name) {
                        ctx.font = '8px "Press Start 2P"';
                        ctx.fillStyle = '#fff';
                        ctx.fillText(entity.name, screenX, screenY - 12);
                    }
                });
                
                // Draw player
                const playerScreenX = this.player.x * this.tileSize - this.camera.x;
                const playerScreenY = this.player.y * this.tileSize - this.camera.y;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(playerScreenX + 4, playerScreenY + 28, 24, 4);
                
                // Player sprite
                const playerSprite = SPRITES[currentCharacter.class] || SPRITES.warrior;
                if (playerSprite instanceof HTMLCanvasElement) {
                    ctx.drawImage(playerSprite, playerScreenX, playerScreenY, this.tileSize, this.tileSize);
                }
                
                // Draw combat effects
                this.combatEffects.forEach(effect => {
                    ctx.font = '16px "Press Start 2P"';
                    ctx.fillStyle = effect.critical ? '#ffaa00' : '#ffffff';
                    ctx.fillText(effect.damage, effect.x - this.camera.x, effect.y - this.camera.y - effect.frame);
                });
                
                // Update minimap
                this.renderMinimap();
            }

            renderMinimap() {
                const canvas = document.getElementById('minimap-canvas');
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = false;
                
                ctx.fillStyle = '#1a332a';
                ctx.fillRect(0, 0, 160, 160);
                
                // Draw grid
                ctx.strokeStyle = '#2a4a2a';
                ctx.lineWidth = 1;
                for (let i = 0; i <= 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * 32, 0);
                    ctx.lineTo(i * 32, 160);
                    ctx.stroke();
                    ctx.moveTo(0, i * 32);
                    ctx.lineTo(160, i * 32);
                    ctx.stroke();
                }
                
                // Draw entities on minimap
                [...this.entities, ...activePlayers.values()].forEach(entity => {
                    const dx = (entity.x - this.player.x) * 2 + 80;
                    const dy = (entity.y - this.player.y) * 2 + 80;
                    
                    if (dx >= 0 && dx <= 160 && dy >= 0 && dy <= 160) {
                        if (entity.type === 'enemy') {
                            ctx.fillStyle = '#ff4444';
                        } else if (entity.type === 'npc') {
                            ctx.fillStyle = '#44aaff';
                        } else {
                            ctx.fillStyle = '#44ff44';
                        }
                        ctx.fillRect(dx - 2, dy - 2, 4, 4);
                    }
                });
                
                // Draw player
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(78, 78, 4, 4);
            }

            movePlayer(dx, dy) {
                this.player.targetX += dx;
                this.player.targetY += dy;
                
                // Update in database
                supabase
                    .from('characters')
                    .update({ x: Math.round(this.player.targetX), y: Math.round(this.player.targetY) })
                    .eq('id', currentCharacter.id);
            }

            addCombatEffect(payload) {
                this.combatEffects.push({
                    x: payload.x,
                    y: payload.y,
                    damage: payload.damage,
                    critical: payload.critical,
                    frame: 0
                });
            }

            interact() {
                const playerX = Math.round(this.player.x);
                const playerY = Math.round(this.player.y);
                
                const nearby = this.entities.find(e => 
                    Math.abs(e.x - playerX) <= 1 && Math.abs(e.y - playerY) <= 1
                );
                
                if (nearby) {
                    if (nearby.type === 'npc') {
                        showNotification(nearby.dialog || 'Hello!', 'info');
                    } else if (nearby.type === 'enemy') {
                        startCombat(nearby);
                    }
                }
            }

            attackNearest() {
                const playerX = Math.round(this.player.x);
                const playerY = Math.round(this.player.y);
                
                const nearest = this.entities.find(e => 
                    e.type === 'enemy' &&
                    Math.abs(e.x - playerX) < 5 && 
                    Math.abs(e.y - playerY) < 5
                );
                
                if (nearest) {
                    startCombat(nearest);
                }
            }
        }

        // ==================== COMBAT SYSTEM ====================
        async function startCombat(enemy) {
            const damage = Math.floor(attackPower + Math.random() * 10);
            const isCritical = Math.random() < 0.1;
            const finalDamage = isCritical ? Math.floor(damage * 1.5) : damage;
            
            enemy.hp -= finalDamage;
            
            // Broadcast combat effect
            ws.send({
                type: 'broadcast',
                event: 'combat',
                payload: {
                    x: enemy.x * 32,
                    y: enemy.y * 32,
                    damage: finalDamage,
                    critical: isCritical
                }
            });
            
            if (enemy.hp <= 0) {
                // Enemy defeated
                const index = gameRenderer.entities.findIndex(e => e.id === enemy.id);
                if (index !== -1) {
                    gameRenderer.entities.splice(index, 1);
                }
                
                // Gain rewards
                const expGain = enemy.level * 20;
                const goldGain = enemy.level * 10;
                
                currentCharacter.exp += expGain;
                currentCharacter.gold += goldGain;
                
                await supabase
                    .from('characters')
                    .update({ 
                        exp: currentCharacter.exp,
                        gold: currentCharacter.gold
                    })
                    .eq('id', currentCharacter.id);
                
                checkLevelUp();
                updateHUD();
                
                showNotification(`Victory! +${expGain} XP, +${goldGain} Gold`, 'success');
            } else {
                // Enemy counterattack
                const enemyDamage = Math.floor(enemy.level * 3 + Math.random() * 5);
                currentCharacter.hp = Math.max(0, currentCharacter.hp - enemyDamage);
                
                await supabase
                    .from('characters')
                    .update({ hp: currentCharacter.hp })
                    .eq('id', currentCharacter.id);
                
                updateHUD();
                
                if (currentCharacter.hp <= 0) {
                    showNotification('You were defeated!', 'error');
                    // Respawn
                    currentCharacter.hp = currentCharacter.max_hp;
                    gameRenderer.player.x = 50;
                    gameRenderer.player.y = 50;
                }
            }
        }

        function checkLevelUp() {
            const expNeeded = currentCharacter.level * 100;
            if (currentCharacter.exp >= expNeeded) {
                currentCharacter.level++;
                currentCharacter.exp -= expNeeded;
                currentCharacter.max_hp += 20;
                currentCharacter.max_mana += 10;
                currentCharacter.hp = currentCharacter.max_hp;
                currentCharacter.mana = currentCharacter.max_mana;
                currentCharacter.attack += 5;
                currentCharacter.defense += 2;
                
                supabase
                    .from('characters')
                    .update({ 
                        level: currentCharacter.level,
                        exp: currentCharacter.exp,
                        max_hp: currentCharacter.max_hp,
                        max_mana: currentCharacter.max_mana,
                        hp: currentCharacter.max_hp,
                        mana: currentCharacter.max_mana,
                        attack: currentCharacter.attack,
                        defense: currentCharacter.defense
                    })
                    .eq('id', currentCharacter.id);
                
                showNotification(`🌟 Level Up! Level ${currentCharacter.level}!`, 'success');
            }
        }

        // ==================== HUD FUNCTIONS ====================
        function updateHUD() {
            if (!currentCharacter) return;
            
            document.getElementById('hud-name').textContent = currentCharacter.name;
            document.getElementById('hud-level').textContent = `Lv.${currentCharacter.level}`;
            
            const hpPercent = (currentCharacter.hp / currentCharacter.max_hp) * 100;
            const mpPercent = (currentCharacter.mana / currentCharacter.max_mana) * 100;
            const expPercent = (currentCharacter.exp / (currentCharacter.level * 100)) * 100;
            
            document.getElementById('hud-hp-bar').style.width = hpPercent + '%';
            document.getElementById('hud-hp-text').textContent = `${currentCharacter.hp}/${currentCharacter.max_hp}`;
            document.getElementById('hud-hp-percent').textContent = Math.floor(hpPercent) + '%';
            
            document.getElementById('hud-mp-bar').style.width = mpPercent + '%';
            document.getElementById('hud-mp-text').textContent = `${currentCharacter.mana}/${currentCharacter.max_mana}`;
            document.getElementById('hud-mp-percent').textContent = Math.floor(mpPercent) + '%';
            
            document.getElementById('hud-exp-bar').style.width = expPercent + '%';
            document.getElementById('hud-exp-text').textContent = `${currentCharacter.exp}/${currentCharacter.level * 100}`;
            
            document.getElementById('hud-gold').textContent = currentCharacter.gold;
            document.getElementById('hud-attack').textContent = currentCharacter.attack;
            document.getElementById('hud-defense').textContent = currentCharacter.defense;
        }

        // ==================== CHAT FUNCTIONS ====================
        function addChatMessage(sender, message, channel = 'global') {
            const messages = document.getElementById('chat-messages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-message';
            
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            msgDiv.innerHTML = `
                <span class="time">[${time}]</span>
                <span class="sender">${sender}:</span>
                <span>${message}</span>
            `;
            
            messages.appendChild(msgDiv);
            messages.scrollTop = messages.scrollHeight;
            
            // Limit messages
            while (messages.children.length > 50) {
                messages.removeChild(messages.firstChild);
            }
        }

        function sendChat() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;
            
            ws.send({
                type: 'broadcast',
                event: 'chat',
                payload: {
                    sender: currentCharacter.name,
                    message: message,
                    channel: currentChatChannel
                }
            });
            
            addChatMessage(currentCharacter.name, message);
            input.value = '';
        }

        // ==================== KEYBOARD CONTROLS ====================
        function handleKeyDown(e) {
            if (e.target.tagName === 'INPUT') return;
            
            const key = e.key.toLowerCase();
            
            if (key === 'w' || key === 'arrowup') {
                gameRenderer?.movePlayer(0, -1);
            } else if (key === 's' || key === 'arrowdown') {
                gameRenderer?.movePlayer(0, 1);
            } else if (key === 'a' || key === 'arrowleft') {
                gameRenderer?.movePlayer(-1, 0);
            } else if (key === 'd' || key === 'arrowright') {
                gameRenderer?.movePlayer(1, 0);
            } else if (key === 'e' || key === ' ') {
                gameRenderer?.interact();
            } else if (key === 'f') {
                gameRenderer?.attackNearest();
            } else if (key === 'i') {
                openInventory();
            } else if (key === 'k') {
                openSkills();
            } else if (key === 'j') {
                openQuests();
            } else if (key === 'p') {
                openPVP();
            }
        }

        function handleKeyUp(e) {
            // No action needed
        }

        // ==================== POPUP FUNCTIONS ====================
        function showPopup(id) {
            document.getElementById(id).classList.add('show');
        }

        function closePopup(id) {
            document.getElementById(id).classList.remove('show');
        }

        function openInventory() {
            renderInventory();
            showPopup('inventory-popup');
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            document.getElementById('inventory-gold').textContent = currentCharacter?.gold || 0;
            
            grid.innerHTML = '';
            
            // Create 24 slots
            for (let i = 0; i < 24; i++) {
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                
                const item = inventory[i];
                if (item) {
                    slot.innerHTML = `
                        <span>${item.icon || '📦'}</span>
                        ${item.quantity > 1 ? `<span class="inv-quantity">${item.quantity}</span>` : ''}
                    `;
                }
                
                grid.appendChild(slot);
            }
        }

        function openSkills() {
            renderSkills();
            showPopup('skills-popup');
        }

        function renderSkills() {
            const list = document.getElementById('skills-list');
            const classSkills = {
                warrior: ['Power Strike', 'Cleave', 'Battle Cry'],
                mage: ['Fireball', 'Frostbolt', 'Arcane Explosion'],
                rogue: ['Backstab', 'Poison', 'Evasion'],
                archer: ['Multi-shot', 'Piercing Arrow', 'Quick Shot'],
                paladin: ['Holy Strike', 'Heal', 'Divine Shield']
            };
            
            const skillsList = classSkills[currentCharacter.class] || [];
            
            list.innerHTML = skillsList.map(skill => `
                <div style="background: #2a2a3a; border: 2px solid #4a3a2a; padding: 15px; margin: 10px 0;">
                    <div style="color: #ffd700;">⚡ ${skill}</div>
                    <div style="color: #a0a0b0; font-size: 10px; margin-top: 5px;">Level 1</div>
                </div>
            `).join('');
        }

        function openQuests() {
            renderQuests();
            showPopup('quests-popup');
        }

        function renderQuests() {
            const list = document.getElementById('quests-list');
            
            if (quests.length === 0) {
                list.innerHTML = '<div style="color: #a0a0b0;">No active quests</div>';
                return;
            }
            
            list.innerHTML = quests.map(quest => `
                <div style="background: #2a2a3a; border: 2px solid #4a3a2a; padding: 15px; margin: 10px 0;">
                    <div style="color: #ffd700;">📜 ${quest.title}</div>
                    <div style="color: #a0a0b0; font-size: 10px; margin: 5px 0;">${quest.description}</div>
                    <div style="color: #44ff44; font-size: 10px;">Progress: ${quest.progress || 0}/${quest.required || 1}</div>
                </div>
            `).join('');
        }

        function openPVP() {
            const content = document.getElementById('pvp-content');
            content.innerHTML = `
                <div style="text-align: center; padding: 20px;">
                    <div style="font-size: 48px; margin-bottom: 20px;">⚔️</div>
                    <h3 style="color: #ffd700; margin-bottom: 15px;">PVP ARENA</h3>
                    <p style="color: #a0a0b0; margin-bottom: 20px;">Battle other players and climb the ranks!</p>
                    <button class="login-btn" onclick="joinPVPQueue()">⚔️ JOIN QUEUE</button>
                </div>
            `;
            showPopup('pvp-popup');
        }

        function joinPVPQueue() {
            showNotification('Searching for opponent...', 'info');
            // Implement PVP matchmaking
        }

        // ==================== NOTIFICATIONS ====================
        function showNotification(message, type = 'info', duration = 3000) {
            const container = document.getElementById('notifications');
            const notif = document.createElement('div');
            notif.className = `notification ${type}`;
            notif.textContent = message;
            container.appendChild(notif);
            
            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transition = 'opacity 0.3s';
                setTimeout(() => notif.remove(), 300);
            }, duration);
        }

        // ==================== EXPORT FUNCTIONS ====================
        window.handleLogin = handleLogin;
        window.handleSignUp = handleSignUp;
        window.logout = logout;
        window.showCharacterCreation = showCharacterCreation;
        window.createCharacter = createCharacter;
        window.openInventory = openInventory;
        window.openSkills = openSkills;
        window.openQuests = openQuests;
        window.openPVP = openPVP;
        window.closePopup = closePopup;
        window.sendChat = sendChat;
    </script>
</body>
</html>
